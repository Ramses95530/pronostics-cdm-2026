<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0E4D64">
<title>Pronostics Coupe du Monde 2026</title>
<style>
  :root{
    --teal:#0E4D64; --teal2:#13657f; --green:#1B7A43; --gold:#E0A100;
    --bg:#f4f6f7; --card:#fff; --line:#e2e8ea; --txt:#1d2a2f; --muted:#6b7a80;
    --input:#FFF7CC;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--txt);padding-bottom:72px;font-size:16px;line-height:1.4}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,var(--teal),var(--teal2));
    color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15)}
  header h1{font-size:16px;margin:0;font-weight:700;flex:1;line-height:1.2}
  header .sub{font-size:11px;opacity:.85;font-weight:400}
  .gear{background:rgba(255,255,255,.15);border:none;color:#fff;width:38px;height:38px;
    border-radius:10px;font-size:18px;cursor:pointer}
  main{padding:12px;max-width:680px;margin:0 auto}
  .banner{background:#fde8e8;color:#a12; border:1px solid #f3c2c2;padding:10px 12px;border-radius:10px;
    font-size:13px;margin-bottom:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;
    overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .card h2{margin:0;padding:10px 14px;font-size:14px;background:#eef3f4;color:var(--teal);
    border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .ph-ko h2{background:#e7f3ec;color:var(--green)}
  .match{display:flex;align-items:center;gap:6px;padding:10px 12px;border-top:1px solid var(--line)}
  .match:first-child{border-top:none}
  .team{flex:1;min-width:0;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
  .team.away{justify-content:flex-end;text-align:right}
  .flag{font-size:18px;flex:none}
  .score{display:flex;align-items:center;gap:4px;flex:none}
  .score input{width:38px;height:42px;border:1.5px solid #d9c98a;background:var(--input);
    border-radius:9px;text-align:center;font-size:18px;font-weight:700;color:#333}
  .score input:disabled{background:#eef1f2;border-color:var(--line);color:#888}
  .score .dash{color:var(--muted);font-weight:700}
  .meta{padding:4px 12px 10px;font-size:11px;color:var(--muted);display:flex;justify-content:space-between;
    border-top:1px dashed var(--line)}
  .pts{font-weight:800;border-radius:20px;padding:2px 9px;font-size:12px;color:#fff}
  .pts.p5{background:var(--gold)} .pts.p3{background:var(--green)} .pts.p0{background:#9aa7ac}
  .real{font-weight:700;color:var(--teal)}
  nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);
    display:flex;z-index:20;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
  nav button{flex:1;background:none;border:none;padding:9px 4px 8px;font-size:11px;color:var(--muted);
    cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600}
  nav button .ic{font-size:21px}
  nav button.active{color:var(--teal)}
  .rank{display:flex;align-items:center;gap:12px;padding:13px 14px;border-top:1px solid var(--line)}
  .rank:first-child{border-top:none}
  .rank .pos{font-size:18px;font-weight:800;width:30px;text-align:center;color:var(--muted)}
  .rank.top1 .pos{color:var(--gold)} .rank.top2 .pos{color:#9aa7ac} .rank.top3 .pos{color:#b3792e}
  .rank .nm{flex:1;font-weight:700}
  .rank .nm small{display:block;font-weight:400;color:var(--muted);font-size:11px}
  .rank .sc{font-size:20px;font-weight:800;color:var(--teal)}
  .rank.self{background:#fff9e6}
  .empty{text-align:center;color:var(--muted);padding:40px 16px;font-size:14px}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;
    justify-content:center;padding:20px}
  .modal .box{background:#fff;border-radius:16px;padding:22px;max-width:340px;width:100%}
  .modal h3{margin:0 0 6px;color:var(--teal)}
  .modal p{margin:0 0 14px;font-size:14px;color:var(--muted)}
  .modal input{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;margin-bottom:12px}
  .btn{width:100%;background:var(--green);color:#fff;border:none;padding:13px;border-radius:11px;
    font-size:16px;font-weight:700;cursor:pointer}
  .btn.alt{background:var(--teal)}
  .btn.ghost{background:#eef3f4;color:var(--teal)}
  .save-flash{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--green);
    color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;
    transition:opacity .3s;z-index:30;pointer-events:none}
  .save-flash.show{opacity:1}
  .adm-team input{width:100%;padding:7px;border:1.5px solid #d9c98a;background:var(--input);
    border-radius:7px;font-size:13px;margin-bottom:4px}
  .tag{font-size:10px;background:#eef3f4;color:var(--teal);border-radius:6px;padding:1px 6px;font-weight:700}
</style>
</head>
<body>
<header>
  <div style="flex:1">
    <h1>🏆 Pronostics Coupe du Monde 2026</h1>
    <div class="sub" id="meLabel"></div>
  </div>
  <button class="gear" id="gearBtn" title="Admin">⚙️</button>
</header>

<main>
  <div id="cfgBanner" class="banner" style="display:none">
    ⚠️ Firebase n'est pas encore configuré : le classement partagé ne fonctionnera pas tant que la clé n'est pas ajoutée.
  </div>
  <div id="view"></div>
</main>

<div class="save-flash" id="flash">✓ Enregistré</div>

<nav>
  <button data-tab="pron" class="active"><span class="ic">📝</span>Pronostics</button>
  <button data-tab="rank"><span class="ic">🏅</span>Classement</button>
</nav>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
/* ============================================================
   1) CONFIG FIREBASE  — remplacée automatiquement au déploiement
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyD-lTBuhjvpBuDHOMVoNbqegXyh9CyrUh4",
  authDomain: "pronostics-cdm-2026-81975.firebaseapp.com",
  databaseURL: "https://pronostics-cdm-2026-81975-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pronostics-cdm-2026-81975",
  storageBucket: "pronostics-cdm-2026-81975.firebasestorage.app",
  messagingSenderId: "981745878655",
  appId: "1:981745878655:web:1e46206dc3d3b5005aa14a"
};
const ADMIN_PIN = "2026";   // code organisateur (modifiable)

/* ============================================================
   2) DONNÉES — équipes & matchs
   ============================================================ */
const FLAGS = {
 "Mexique":"🇲🇽","Corée du Sud":"🇰🇷","Afrique du Sud":"🇿🇦","Tchéquie":"🇨🇿",
 "Canada":"🇨🇦","Suisse":"🇨🇭","Qatar":"🇶🇦","Bosnie-Herzégovine":"🇧🇦",
 "Brésil":"🇧🇷","Maroc":"🇲🇦","Écosse":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Haïti":"🇭🇹",
 "États-Unis":"🇺🇸","Australie":"🇦🇺","Paraguay":"🇵🇾","Turquie":"🇹🇷",
 "Allemagne":"🇩🇪","Équateur":"🇪🇨","Côte d'Ivoire":"🇨🇮","Curaçao":"🇨🇼",
 "Pays-Bas":"🇳🇱","Japon":"🇯🇵","Tunisie":"🇹🇳","Suède":"🇸🇪",
 "Belgique":"🇧🇪","Iran":"🇮🇷","Égypte":"🇪🇬","Nouvelle-Zélande":"🇳🇿",
 "Espagne":"🇪🇸","Cap-Vert":"🇨🇻","Uruguay":"🇺🇾","Arabie saoudite":"🇸🇦",
 "France":"🇫🇷","Sénégal":"🇸🇳","Norvège":"🇳🇴","Irak":"🇮🇶",
 "Argentine":"🇦🇷","Autriche":"🇦🇹","Algérie":"🇩🇿","Jordanie":"🇯🇴",
 "Portugal":"🇵🇹","RD Congo":"🇨🇩","Ouzbékistan":"🇺🇿","Colombie":"🇨🇴",
 "Angleterre":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croatie":"🇭🇷","Panama":"🇵🇦","Ghana":"🇬🇭"
};
const GROUPS = {
 A:["Mexique","Corée du Sud","Afrique du Sud","Tchéquie"],
 B:["Canada","Suisse","Qatar","Bosnie-Herzégovine"],
 C:["Brésil","Maroc","Écosse","Haïti"],
 D:["États-Unis","Australie","Paraguay","Turquie"],
 E:["Allemagne","Équateur","Côte d'Ivoire","Curaçao"],
 F:["Pays-Bas","Japon","Tunisie","Suède"],
 G:["Belgique","Iran","Égypte","Nouvelle-Zélande"],
 H:["Espagne","Cap-Vert","Uruguay","Arabie saoudite"],
 I:["France","Sénégal","Norvège","Irak"],
 J:["Argentine","Autriche","Algérie","Jordanie"],
 K:["Portugal","RD Congo","Ouzbékistan","Colombie"],
 L:["Angleterre","Croatie","Panama","Ghana"]
};
const PAIRS=[[0,1,1],[2,3,1],[0,2,2],[1,3,2],[0,3,3],[1,2,3]];
const MATCHES=[];
Object.keys(GROUPS).forEach(g=>{
  PAIRS.forEach(([i,k,d])=>{
    MATCHES.push({id:`G${g}_${i}${k}`,phase:`Groupe ${g}`,grp:g,jour:`J${d}`,
      home:GROUPS[g][i],away:GROUPS[g][k],ko:false});
  });
});
const KO=[["16es de finale",16,"R32"],["8es de finale",8,"R16"],["Quarts de finale",4,"QF"],
         ["Demi-finales",2,"SF"],["Match 3e place",1,"TP"],["Finale",1,"FIN"]];
KO.forEach(([name,n,code])=>{
  for(let i=1;i<=n;i++){
    MATCHES.push({id:`${code}_${i}`,phase:name,grp:null,
      label:n===1?name:`${name} #${i}`,home:"",away:"",ko:true});
  }
});

/* ============================================================
   3) ÉTAT & FIREBASE
   ============================================================ */
let DB=null, ONLINE=false;
let STATE={preds:{}, results:{}, players:{}, koTeams:{}};
const PID = (()=>{ let v=localStorage.getItem('pid'); if(!v){v='p_'+Math.random().toString(36).slice(2,10);localStorage.setItem('pid',v);} return v; })();
let NAME = localStorage.getItem('name')||"";
let TAB='pron', ADMIN=false;

const cfgOk = !firebaseConfig.apiKey.startsWith("__");
if(cfgOk){
  try{
    firebase.initializeApp(firebaseConfig);
    DB=firebase.database();
    DB.ref('predictions').on('value',s=>{STATE.preds=s.val()||{};render();});
    DB.ref('results').on('value',s=>{STATE.results=s.val()||{};render();});
    DB.ref('players').on('value',s=>{STATE.players=s.val()||{};render();});
    DB.ref('koTeams').on('value',s=>{STATE.koTeams=s.val()||{};render();});
    ONLINE=true;
  }catch(e){console.error(e);}
}else{
  document.getElementById('cfgBanner').style.display='block';
}

function save(path,val){ if(DB) DB.ref(path).set(val); flash(); }
function flash(){ const f=document.getElementById('flash'); f.classList.add('show'); clearTimeout(f._t); f._t=setTimeout(()=>f.classList.remove('show'),1100); }

function teamsOf(m){
  if(!m.ko) return {home:m.home,away:m.away,ready:true};
  const t=STATE.koTeams[m.id]||{};
  return {home:t.home||"",away:t.away||"",ready:!!(t.home&&t.away)};
}
function flag(t){ return FLAGS[t]||"⚽"; }

function pointsFor(pred,res){
  if(!pred||!res||res.h==null||res.a==null||pred.h==null||pred.a==null) return null;
  if(pred.h===res.h && pred.a===res.a) return 5;
  const sp=Math.sign(pred.h-pred.a), sr=Math.sign(res.h-res.a);
  return sp===sr?3:0;
}

/* ============================================================
   4) RENDER
   ============================================================ */
function render(){
  document.getElementById('meLabel').textContent = NAME?("Joueur : "+NAME):"";
  if(TAB==='pron') renderPron();
  else if(TAB==='rank') renderRank();
  else if(TAB==='admin') renderAdmin();
}

function matchRow(m){
  const {home,away,ready}=teamsOf(m);
  const res=STATE.results[m.id];
  const myp=(STATE.preds[PID]||{})[m.id];
  const locked = !!(res&&res.h!=null&&res.a!=null);
  const disabled = locked || !ready;
  const hv=myp&&myp.h!=null?myp.h:"";
  const av=myp&&myp.a!=null?myp.a:"";
  const ht=ready?home:"À venir", at=ready?away:"À venir";
  let meta="";
  if(locked){
    const p=pointsFor(myp,res);
    const badge=p==null?'<span class="tag">non joué par vous</span>':`<span class="pts p${p}">${p} pt${p>1?'s':''}</span>`;
    meta=`<div class="meta"><span class="real">Résultat : ${res.h} - ${res.a}</span>${badge}</div>`;
  } else if(!ready){
    meta=`<div class="meta"><span>Équipes à définir</span><span class="tag">verrouillé</span></div>`;
  } else {
    meta=`<div class="meta"><span>Votre prono</span><span class="tag">${m.ko?m.label:m.jour}</span></div>`;
  }
  return `<div class="match" data-mid="${m.id}">
      <div class="team"><span class="flag">${flag(ht)}</span><span>${ht}</span></div>
      <div class="score">
        <input type="number" inputmode="numeric" min="0" max="30" value="${hv}" ${disabled?'disabled':''} data-side="h">
        <span class="dash">–</span>
        <input type="number" inputmode="numeric" min="0" max="30" value="${av}" ${disabled?'disabled':''} data-side="a">
      </div>
      <div class="team away"><span>${at}</span><span class="flag">${flag(at)}</span></div>
    </div>${meta}`;
}

function renderPron(){
  if(!NAME){ openName(); }
  let html="";
  Object.keys(GROUPS).forEach(g=>{
    const ms=MATCHES.filter(m=>m.grp===g);
    let done=ms.filter(m=>{const p=(STATE.preds[PID]||{})[m.id];return p&&p.h!=null&&p.a!=null;}).length;
    html+=`<div class="card"><h2><span>Groupe ${g}</span><span class="tag">${done}/6 pronos</span></h2>${ms.map(matchRow).join('')}</div>`;
  });
  KO.forEach(([name,n,code])=>{
    const ms=MATCHES.filter(m=>m.phase===name);
    html+=`<div class="card ph-ko"><h2><span>${name}</span></h2>${ms.map(matchRow).join('')}</div>`;
  });
  const v=document.getElementById('view'); v.innerHTML=html;
  v.querySelectorAll('.match input').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const mid=e.target.closest('.match').dataset.mid;
      const side=e.target.dataset.side;
      let val=e.target.value===""?null:Math.max(0,Math.min(30,parseInt(e.target.value)));
      e.target.value=val==null?"":val;
      const cur=(STATE.preds[PID]||{})[mid]||{h:null,a:null};
      cur[side]=val;
      save(`predictions/${PID}/${mid}`,cur);
      if(!STATE.preds[PID])STATE.preds[PID]={};
      STATE.preds[PID][mid]=cur;
    });
  });
}

function renderRank(){
  const rows=[];
  Object.keys(STATE.players).forEach(pid=>{
    let pts=0,exact=0,played=0;
    MATCHES.forEach(m=>{
      const res=STATE.results[m.id];
      const pr=(STATE.preds[pid]||{})[m.id];
      const p=pointsFor(pr,res);
      if(p!=null){pts+=p;played++;if(p===5)exact++;}
    });
    rows.push({pid,name:STATE.players[pid]||"?",pts,exact,played});
  });
  rows.sort((a,b)=> b.pts-a.pts || b.exact-a.exact || a.name.localeCompare(b.name));
  let html;
  if(rows.length===0){
    html=`<div class="empty">Aucun joueur pour l'instant.<br>Les pronostics rempliront le classement automatiquement. 🎯</div>`;
  }else{
    html=`<div class="card"><h2><span>🏅 Classement général</span><span class="tag">${rows.length} joueurs</span></h2>`;
    rows.forEach((r,i)=>{
      const topcls=i<3?` top${i+1}`:'';
      const self=r.pid===PID?' self':'';
      html+=`<div class="rank${topcls}${self}">
        <div class="pos">${i+1}</div>
        <div class="nm">${r.name}${self?' <span class="tag">vous</span>':''}<small>${r.played} matchs notés · ${r.exact} score(s) exact(s)</small></div>
        <div class="sc">${r.pts}</div></div>`;
    });
    html+=`</div><div class="empty" style="padding:14px">Barème : 5 pts score exact · 3 pts bon résultat · 0 sinon.</div>`;
  }
  document.getElementById('view').innerHTML=html;
}

function renderAdmin(){
  let html=`<div class="banner" style="background:#e7f3ec;color:#0a5a2c;border-color:#b9e0c6">
    🔧 Espace organisateur — saisissez les scores réels et les équipes de la phase finale. Tout est partagé en direct.</div>`;
  Object.keys(GROUPS).forEach(g=>{
    const ms=MATCHES.filter(m=>m.grp===g);
    html+=`<div class="card"><h2>Groupe ${g}</h2>`;
    ms.forEach(m=>{ html+=admRow(m); });
    html+=`</div>`;
  });
  KO.forEach(([name,n,code])=>{
    const ms=MATCHES.filter(m=>m.phase===name);
    html+=`<div class="card ph-ko"><h2>${name}</h2>`;
    ms.forEach(m=>{ html+=admRow(m,true); });
    html+=`</div>`;
  });
  html+=`<button class="btn ghost" id="leaveAdmin" style="margin-bottom:20px">← Quitter l'espace admin</button>`;
  const v=document.getElementById('view'); v.innerHTML=html;
  v.querySelectorAll('.adm-res').forEach(inp=>inp.addEventListener('change',e=>{
    const mid=e.target.closest('[data-mid]').dataset.mid, side=e.target.dataset.side;
    let val=e.target.value===""?null:Math.max(0,Math.min(30,parseInt(e.target.value)));
    e.target.value=val==null?"":val;
    const cur=STATE.results[mid]||{h:null,a:null}; cur[side]=val;
    save(`results/${mid}`,cur);
  }));
  v.querySelectorAll('.adm-tm').forEach(inp=>inp.addEventListener('change',e=>{
    const mid=e.target.closest('[data-mid]').dataset.mid, side=e.target.dataset.side;
    const cur=STATE.koTeams[mid]||{home:"",away:""}; cur[side]=e.target.value.trim();
    save(`koTeams/${mid}`,cur);
  }));
  document.getElementById('leaveAdmin').onclick=()=>{ADMIN=false;setTab('pron');};
}
function admRow(m,ko){
  const {home,away}=teamsOf(m); const res=STATE.results[m.id]||{};
  const t=STATE.koTeams[m.id]||{};
  let teamFields= ko ?
    `<div style="flex:1" class="adm-team">
       <input class="adm-tm" data-side="home" placeholder="Équipe domicile" value="${t.home||''}">
       <input class="adm-tm" data-side="away" placeholder="Équipe extérieur" value="${t.away||''}"></div>`
    : `<div class="team"><span class="flag">${flag(home)}</span><span>${home}</span></div>`;
  let awayLabel= ko ? '' : `<div class="team away"><span>${away}</span><span class="flag">${flag(away)}</span></div>`;
  return `<div class="match" data-mid="${m.id}">
     ${teamFields}
     <div class="score">
       <input class="adm-res" type="number" inputmode="numeric" min="0" max="30" value="${res.h!=null?res.h:''}" data-side="h">
       <span class="dash">–</span>
       <input class="adm-res" type="number" inputmode="numeric" min="0" max="30" value="${res.a!=null?res.a:''}" data-side="a">
     </div>
     ${awayLabel}
   </div>`;
}

/* ============================================================
   5) NAV / MODALS
   ============================================================ */
function setTab(t){ TAB=t; document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t)); render(); }
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));

document.getElementById('gearBtn').onclick=()=>{
  if(ADMIN){ setTab('admin'); return; }
  const pin=prompt("Code organisateur :");
  if(pin===ADMIN_PIN){ ADMIN=true; setTab('admin'); }
  else if(pin!=null){ alert("Code incorrect."); }
};

function openName(){
  if(document.getElementById('nameModal'))return;
  const d=document.createElement('div'); d.className='modal'; d.id='nameModal';
  d.innerHTML=`<div class="box"><h3>Bienvenue ! 🏆</h3>
    <p>Entre ton prénom pour rejoindre le concours de pronostics.</p>
    <input id="nameIn" placeholder="Ton prénom" maxlength="20" value="${NAME}">
    <button class="btn" id="nameOk">C'est parti</button></div>`;
  document.body.appendChild(d);
  document.getElementById('nameIn').focus();
  document.getElementById('nameOk').onclick=()=>{
    const n=document.getElementById('nameIn').value.trim();
    if(!n)return;
    NAME=n; localStorage.setItem('name',n);
    if(DB) DB.ref('players/'+PID).set(n);
    d.remove(); render();
  };
}

if(!NAME) openName(); else if(DB) DB.ref('players/'+PID).set(NAME);
render();
</script>
</body>
</html>
